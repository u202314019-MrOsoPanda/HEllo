services:
  - type: web
    name: smartroute-wms
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: FLASK_SECRET_KEY
        generateValue: true
